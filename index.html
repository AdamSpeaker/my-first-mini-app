<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nafs Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; user-select: none; }
    body { font-family: 'Inter', sans-serif; background-color: #000; color: white; overflow: hidden; touch-action: manipulation; }
    .app-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: grayscale(100%) brightness(0.5); z-index: -1; transition: background-image 0.5s ease-in-out; }
    .glass-panel { background: rgba(20, 20, 20, 0.7); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
    .note-item { background: rgba(255, 255, 255, 0.05); border-radius: 12px; padding: 12px; margin-bottom: 8px; transition: all 0.2s ease; }
    .note-item:active { background: rgba(255, 255, 255, 0.1); }
    .custom-button { display: block; width: 100%; text-align: center; padding: 10px; font-size: 1rem; font-weight: 600; border-radius: 8px; background: rgba(255, 255, 255, 0.1); color: white; margin-top: 20px; transition: background 0.3s ease; }
    .custom-button:hover { background: rgba(255, 255, 255, 0.3); }
  </style>
</head>
<body>
  <div class="app-bg" id="app-bg"></div>
  <div class="relative h-screen flex flex-col max-w-md mx-auto w-full">
    <div id="main-content" class="flex-1 overflow-y-auto px-4 pb-28 fade-in">
      <!-- Main Content -->
      <h1> Добро пожаловать!</h1>
    </div>
    <div id="notes-content" class="hidden flex-1 overflow-y-auto px-4 pb-28 fade-in">
      <h1> Заметки </h1>
      <button class="custom-button" onclick="switchView('main')">Назад</button>
    </div>
  </div>
  <script>
    function switchView(viewName) {
      const mainContent = document.getElementById('main-content');
      const notesContent = document.getElementById('notes-content');
      if (viewName === 'main') {
        mainContent.classList.remove('hidden');
        notesContent.classList.add('hidden');
      } else if (viewName === 'notes') {
        mainContent.classList.add('hidden');
        notesContent.classList.remove('hidden');
      }
    }
  </script>
</body>
</html>
