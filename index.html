<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Nafs Control</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    * { -webkit-tap-highlight-color: transparent; user-select: none; }
    body { font-family: 'Inter', sans-serif; background-color: #000; color: white; overflow: hidden; touch-action: manipulation; }
    .app-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; filter: grayscale(100%) brightness(0.5); z-index: -1; transition: background-image 0.5s ease-in-out; }
    /* Additional styles... */
  </style>
</head>
<body>
  <div class="app-bg"></div>
  <div class="content">
    <h1>Welcome to Nafs Control</h1>
    <!-- Additional content... -->
  </div>
</body>
</html>
